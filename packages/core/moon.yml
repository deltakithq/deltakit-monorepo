$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: 'core'
  type: 'library'

stack: frontend
language: typescript

tasks:
  build:
    command: 'pnpm'
    args: ['exec', 'tsup']
    deps: []
    inputs:
      - 'src/**/*'
      - 'tsup.config.ts'
      - 'tsconfig.json'
    outputs:
      - 'dist'

  dev:
    command: 'pnpm'
    args: ['exec', 'tsup', '--watch']
    type: 'run'

  test:
    command: 'echo'
    args: ['No tests for core package']

  publish:
    command: 'pnpm'
    args: ['publish', '--access', 'public', '--no-git-checks']
    deps:
      - '~:build'
    options:
      cwd: 'packages/core'
