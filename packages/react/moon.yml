$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: 'react'
  description: 'DeltaKit React components'

stack: frontend
language: typescript

tasks:
  build:
    command: 'pnpm'
    args: ['exec', 'tsup']
    deps:
      - 'core:build'
    inputs:
      - 'src/**/*'
      - 'tsup.config.ts'
      - 'tsconfig.json'
    outputs:
      - 'dist/**/*'

  dev:
    command: 'pnpm'
    args: ['exec', 'tsup', '--watch']
    type: 'run'

  check:
    command: 'pnpm'
    args: ['exec', 'biome', 'check', 'src/']
    inputs:
      - 'src/**/*'
      - 'biome.json'

  test:
    command: 'echo'
    args: ['No tests for react package']

  typecheck:
    command: 'pnpm'
    args: ['exec', 'tsc', '--noEmit']
    deps:
      - 'core:build'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'

  publish:
    command: 'pnpm'
    args: ['publish', '--access', 'public', '--no-git-checks']
    deps:
      - '~:build'
