$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: 'fastapi-tanstack-backend'
  description: 'FastAPI backend'

stack: backend

language: python

tasks:
  build:
    command: 'echo'
    args: ['Python backend - no build step required']
    type: 'run'

  dev:
    command: 'uv'
    args: ['run', 'uvicorn', 'src.main:app', '--reload', '--port', '8000']
    type: 'run'
  
  start:
    command: 'uv'
    args: ['run', 'uvicorn', 'src.main:app', '--host', '0.0.0.0', '--port', '8000']
    type: 'run'
  
  check:
    command: 'uv'
    args: ['run', 'ruff', 'check', '.']
    type: 'run'
  
  format:
    command: 'uv'
    args: ['run', 'ruff', 'format', '.']
    type: 'run'
  
  typecheck:
    command: 'uv'
    args: ['run', 'mypy', 'src/']
    type: 'run'
  
  migrate:
    command: 'uv'
    args: ['run', 'alembic', 'upgrade', 'head']
    type: 'run'
  
  migration:
    command: 'uv'
    args: ['run', 'alembic', 'revision', '--autogenerate', '-m']
    type: 'run'
