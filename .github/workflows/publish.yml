name: Publish

on:
  push:
    branches:
      - main

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  detect:
    name: Detect unpublished versions
    if: "${{ github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'chore(release): version packages') }}"
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.check.outputs.core }}
      markdown: ${{ steps.check.outputs.markdown }}
      react: ${{ steps.check.outputs.react }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Check which packages need publishing
        id: check
        run: |
          check_package() {
            local dir=$1
            local name=$2
            local key=$3
            local local_version
            local registry_version

            local_version=$(node -p "require('./${dir}/package.json').version")
            registry_version=$(npm view "${name}" version 2>/dev/null || echo "0.0.0")

            if [ "$local_version" != "$registry_version" ]; then
              echo "${key}=true" >> "$GITHUB_OUTPUT"
              echo "${name}@${local_version} needs publishing (registry has ${registry_version})"
            else
              echo "${key}=false" >> "$GITHUB_OUTPUT"
              echo "${name}@${local_version} already published"
            fi
          }

          check_package "packages/core" "@deltakit/core" "core"
          check_package "packages/markdown" "@deltakit/markdown" "markdown"
          check_package "packages/react" "@deltakit/react" "react"

  publish-core:
    name: Publish @deltakit/core
    needs: detect
    if: needs.detect.outputs.core == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Moon
        uses: moonrepo/setup-moon-action@v1

      - name: Build
        run: moon run core:build

      - name: Publish
        run: pnpm publish --filter @deltakit/core --access public --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-markdown:
    name: Publish @deltakit/markdown
    needs: [detect, publish-core]
    if: |
      always() &&
      needs.detect.result == 'success' &&
      needs.detect.outputs.markdown == 'true' &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Moon
        uses: moonrepo/setup-moon-action@v1

      - name: Build
        run: moon run markdown:build

      - name: Publish
        run: pnpm publish --filter @deltakit/markdown --access public --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-react:
    name: Publish @deltakit/react
    needs: [detect, publish-core]
    if: |
      always() &&
      needs.detect.result == 'success' &&
      needs.detect.outputs.react == 'true' &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Moon
        uses: moonrepo/setup-moon-action@v1

      - name: Build
        run: moon run react:build

      - name: Publish
        run: pnpm publish --filter @deltakit/react --access public --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
